services:
  order-work:
    build: .
    image: order-work:latest
    container_name: order-work-service
    ports:
      - "3880:80"
    volumes:
      - order-work-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1/api/health', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  order-work-data:
